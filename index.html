<!doctype html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
        <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-detector.js"></script>
        <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-handler.js"></script>

        <script>
            AFRAME.registerComponent('video-plane-handler', {
                schema: {
                    video: { type: 'selector' },
                    height: { type: 'number', default: 1.4 }
                },

							init: function () {
									const plane = this.el;
									const video = this.data.video;
									const marker = plane.closest('a-marker');

									let hasStarted = false;
									let hasFinished = false;
									let userUnlocked = false;

									// with sound
									const unlockAudio = () => {
											if (userUnlocked) return;
											userUnlocked = true;

											video.muted = false;
											video.volume = 1;

											video.play().then(() => {
													video.pause();
													video.currentTime = 0;
											}).catch((err) => {
													console.log('Initial audio unlock failed:', err);
											});
									};

									document.addEventListener('click', unlockAudio, { once: true });
									document.addEventListener('touchstart', unlockAudio, { once: true });

									if (!video || !marker) {
											console.warn('Video or marker not found.');
											return;
									}

									// vertical
									const fallbackAspect = 9 / 16;
									this.setPlaneSize(fallbackAspect);

									plane.setAttribute('material', {
											shader: 'flat',
											src: '#vid',
											side: 'double'
									});

									const applyAspectRatio = () => {
											if (video.videoWidth && video.videoHeight) {
													const aspect = video.videoWidth / video.videoHeight;
													this.setPlaneSize(aspect);
													console.log('Video aspect applied:', video.videoWidth, video.videoHeight, aspect);
											} else {
													console.warn('Video metadata not available. Using fallback 9:16.');
											}
									};

									if (video.readyState >= 1) {
											applyAspectRatio();
									} else {
											video.addEventListener('loadedmetadata', applyAspectRatio, { once: true });
									}

									video.addEventListener('ended', () => {
											hasFinished = true;
											video.pause();

											if (video.duration && isFinite(video.duration)) {
													video.currentTime = Math.max(video.duration - 0.05, 0);
											}
									});

									marker.addEventListener('markerFound', () => {
											if (hasFinished) return;

											video.muted = false;
											video.volume = 1;

											if (!hasStarted) {
													hasStarted = true;
													video.currentTime = 0;
											}

											video.play().catch((error) => {
													console.warn('Video play failed:', error);
											});
									});

									marker.addEventListener('markerLost', () => {
											if (!hasFinished) {
													video.pause();
											}
									});
							},

                setPlaneSize: function (aspect) {
                    const height = this.data.height;
                    const width = height * aspect;

                    this.el.setAttribute('geometry', {
                        primitive: 'plane',
                        width: width,
                        height: height
                    });
                }
            });
        </script>
    </head>

    <body style="margin: 0; overflow: hidden;">
        <a-scene
            vr-mode-ui="enabled: false"
            loading-screen="enabled: false;"
            arjs="sourceType: webcam; debugUIEnabled: false;"
            id="scene"
            embedded
            gesture-detector
        >
            <a-assets>
                <video
                    id="vid"
                    src="assets/asset.mp4"
                    preload="auto"
                    webkit-playsinline
                    playsinline
                    muted
                ></video>
            </a-assets>

            <a-marker
                type="pattern"
                preset="custom"
                url="assets/marker.patt"
                smooth="true"
                smoothCount="10"
                smoothTolerance="0.01"
                smoothThreshold="5"
                raycaster="objects: .clickable"
                emitevents="true"
                cursor="fuse: false; rayOrigin: mouse;"
                id="markerA"
            >
                <a-plane
                    id="videoPlane"
                    position="0 0.1 0"
                    rotation="-45 0 0"
                    class="clickable"
                    gesture-handler
                    video-plane-handler="video: #vid; height: 1.4"
                ></a-plane>
            </a-marker>

            <a-entity camera></a-entity>
        </a-scene>
    </body>
</html>
