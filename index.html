<!doctype html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
        <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-detector.js"></script>
        <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-handler.js"></script>

        <script>
            AFRAME.registerComponent('video-plane-handler', {
                schema: {
                    video: { type: 'selector' },
                    height: { type: 'number', default: 1.4 }
                },

                init: function () {
                    const plane = this.el;
                    const video = this.data.video;
                    const marker = plane.closest('a-marker');

                    let markerVisible = false;

                    let silentStarted = false;
                    let silentFinished = false;

                    let soundStarted = false;
                    let soundFinished = false;

                    let mode = 'idle';
                    // idle / silent / silent-ended / sound / sound-ended

                    if (!video || !marker) {
                        console.warn('Video or marker not found.');
                        return;
                    }

                    // Set the video for muted autoplay first.
                    video.muted = true;
                    video.setAttribute('muted', '');
                    video.playsInline = true;
                    video.setAttribute('playsinline', '');
                    video.setAttribute('webkit-playsinline', '');
                    video.load();

                    // Use a portrait fallback size first, so it does not appear as a square before metadata is loaded.
                    const fallbackAspect = 9 / 16;
                    this.setPlaneSize(fallbackAspect);

                    // Apply the video texture to the plane.
                    plane.setAttribute('material', {
                        shader: 'flat',
                        src: '#vid',
                        side: 'double'
                    });

                    const applyAspectRatio = () => {
                        if (video.videoWidth && video.videoHeight) {
                            const aspect = video.videoWidth / video.videoHeight;
                            this.setPlaneSize(aspect);
                            console.log('Video aspect applied:', video.videoWidth, video.videoHeight, aspect);
                        }
                    };

                    if (video.readyState >= 1) {
                        applyAspectRatio();
                    } else {
                        video.addEventListener('loadedmetadata', applyAspectRatio, { once: true });
                    }

                    const stopAtLastFrame = () => {
                        video.pause();

                        // Some browsers may show a black frame or jump back to the first frame at the exact duration.
                        // Stop slightly before the end to keep the final frame visible.
                        if (video.duration && isFinite(video.duration)) {
                            video.currentTime = Math.max(video.duration - 0.05, 0);
                        }
                    };

                    const playSilentOnce = () => {
                        if (silentStarted || soundStarted) return;

                        silentStarted = true;
                        mode = 'silent';

                        video.muted = true;
                        video.setAttribute('muted', '');
                        video.currentTime = 0;

                        video.play().catch((error) => {
                            console.warn('Silent video play failed:', error);
                        });
                    };

                    const playSoundOnceFromStart = () => {
                        if (soundStarted || soundFinished) return;

                        soundStarted = true;
                        mode = 'sound';

                        // Switch to sound playback when the user taps the screen.
                        video.muted = false;
                        video.removeAttribute('muted');
                        video.volume = 1;

                        // Restart from the beginning for the sound playback.
                        video.pause();
                        video.currentTime = 0;

                        video.play().catch((error) => {
                            console.warn('Sound video play failed:', error);
                        });
                    };

                    video.addEventListener('ended', () => {
                        if (mode === 'silent') {
                            silentFinished = true;
                            mode = 'silent-ended';
                            stopAtLastFrame();
                            return;
                        }

                        if (mode === 'sound') {
                            soundFinished = true;
                            mode = 'sound-ended';
                            stopAtLastFrame();
                            return;
                        }

                        stopAtLastFrame();
                    });

                    marker.addEventListener('markerFound', () => {
                        markerVisible = true;

                        // Play the video once in muted mode when the marker is detected.
                        if (!silentStarted && !soundStarted) {
                            playSilentOnce();
                            return;
                        }

                        // Resume muted playback only if it was paused before finishing.
                        if (mode === 'silent' && !silentFinished) {
                            video.muted = true;
                            video.play().catch((error) => {
                                console.warn('Silent resume failed:', error);
                            });
                        }

                        // Resume sound playback only if it was paused before finishing.
                        if (mode === 'sound' && !soundFinished) {
                            video.muted = false;
                            video.removeAttribute('muted');
                            video.play().catch((error) => {
                                console.warn('Sound resume failed:', error);
                            });
                        }
                    });

                    marker.addEventListener('markerLost', () => {
                        markerVisible = false;

                        // Pause only while the muted playback is still in progress.
                        if (mode === 'silent' && !silentFinished) {
                            video.pause();
                        }

                        // Pause only while the sound playback is still in progress.
                        if (mode === 'sound' && !soundFinished) {
                            video.pause();
                        }
                    });

                    // Replay the video once with sound from the beginning when the user taps the screen.
                    const handleUserTap = () => {
                        if (!markerVisible) return;
                        playSoundOnceFromStart();
                    };

                    document.addEventListener('touchstart', handleUserTap, { once: false });
                    document.addEventListener('click', handleUserTap, { once: false });
                },

                setPlaneSize: function (aspect) {
                    const height = this.data.height;
                    const width = height * aspect;

                    this.el.setAttribute('geometry', {
                        primitive: 'plane',
                        width: width,
                        height: height
                    });
                }
            });
        </script>
    </head>

    <body style="margin: 0; overflow: hidden;">
        <a-scene
            vr-mode-ui="enabled: false"
            loading-screen="enabled: false;"
            arjs="sourceType: webcam; debugUIEnabled: false;"
            id="scene"
            embedded
            gesture-detector
        >
            <a-assets>
                <video
                    id="vid"
                    src="assets/asset.mp4"
                    preload="auto"
                    webkit-playsinline
                    playsinline
                    muted
                ></video>
            </a-assets>

            <a-marker
                type="pattern"
                preset="custom"
                url="assets/marker.patt"
                smooth="true"
                smoothCount="10"
                smoothTolerance="0.01"
                smoothThreshold="5"
                raycaster="objects: .clickable"
                emitevents="true"
                cursor="fuse: false; rayOrigin: mouse;"
                id="markerA"
            >
                <a-plane
                    id="videoPlane"
                    position="0 0.1 0"
                    rotation="-45 0 0"
                    class="clickable"
                    gesture-handler
                    video-plane-handler="video: #vid; height: 1.4"
                ></a-plane>
            </a-marker>

            <a-entity camera></a-entity>
        </a-scene>
    </body>
</html>
